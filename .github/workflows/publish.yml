name: Publish

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate library publication
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate publishing
        run: ./gradlew :permissionflow:publishToMavenLocal

  release:
    name: Release publication
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'

    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check publishing secrets
        run: |
          test -n "$MAVEN_CENTRAL_USERNAME"
          test -n "$MAVEN_CENTRAL_PASSWORD"
          test -n "$SIGNING_KEY$SIGNING_KEY_BASE64"
          test -n "$SIGNING_PASSWORD"

      - name: Prepare signing key
        run: |
          SIGNING_KEY_FILE="$RUNNER_TEMP/signing-key.asc"
          if [ -n "$SIGNING_KEY_BASE64" ]; then
            printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > "$SIGNING_KEY_FILE"
          else
            printf '%s' "$SIGNING_KEY" > "$SIGNING_KEY_FILE"
          fi
          test -s "$SIGNING_KEY_FILE"
          grep -q "BEGIN PGP PRIVATE KEY BLOCK" "$SIGNING_KEY_FILE"
          echo "SIGNING_KEY_FILE=$SIGNING_KEY_FILE" >> "$GITHUB_ENV"

      - name: Publish to Maven Central
        run: ./gradlew :permissionflow:publishReleasePublicationToMavenCentralRepository
