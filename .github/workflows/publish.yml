name: Publish

on:
  push:
    branches:
      - master
    tags:
      - "v*"

  pull_request:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read

jobs:

  validate:
    name: Validate library publication
    runs-on: ubuntu-latest

    if: github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'

    steps:
     - uses: actions/checkout@v4

     - uses: actions/setup-java@v4
       with:
         distribution: temurin
         java-version: 17

     - uses: gradle/actions/setup-gradle@v4

     - name: Validate publishing
       run: ./gradlew publishToMavenLocal

  release:
     name: Release publication
     runs-on: ubuntu-latest

     if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'

     env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

     steps:
       - uses: actions/checkout@v4

       - uses: actions/setup-java@v4
         with:
          distribution: temurin
          java-version: 17

       - uses: gradle/actions/setup-gradle@v4

       - name: Prepare signing properties
         run: |
           test -n "$ORG_GRADLE_PROJECT_mavenCentralUsername"
           test -n "$ORG_GRADLE_PROJECT_mavenCentralPassword"
           test -n "$SIGNING_KEY"
           test -n "$SIGNING_PASSWORD"

           signing_key_file="$RUNNER_TEMP/signing-key.asc"
           printf '%s' "$SIGNING_KEY" | perl -pe 's/\\n/\n/g' > "$signing_key_file"

           test -s "$signing_key_file"
           grep -q "BEGIN PGP PRIVATE KEY BLOCK" "$signing_key_file"

           gradle_properties="$GRADLE_USER_HOME/gradle.properties"
           mkdir -p "$GRADLE_USER_HOME"
           touch "$gradle_properties"
           {
             printf 'signingInMemoryKey='
             awk '{ gsub(/\\/, "\\\\"); gsub(/\r/, ""); printf "%s\\n", $0 }' "$signing_key_file"
             printf '\n'
             printf 'signingInMemoryKeyPassword=%s\n' "$SIGNING_PASSWORD"
           } >> "$gradle_properties"

       - name: Publish to Maven Central
         run: ./gradlew publishAndReleaseToMavenCentral
